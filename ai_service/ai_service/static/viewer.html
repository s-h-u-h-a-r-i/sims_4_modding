<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NPC AI — viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var base = location.pathname.replace(/\/?$/, '/');
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = base + 'static/viewer.css';
        document.head.appendChild(link);
      })();
    </script>
  </head>
  <body>
    <header class="u-flex-between u-gap-md">
      <div id="status">Connecting…</div>
      <div class="header-actions u-flex-center u-gap-sm">
        <button type="button" class="header-ghost-btn" id="modLogToggle" title="Mod log stream">
          Logs
        </button>
        <div class="ai-toggle u-flex-center u-gap-sm">
          <span id="aiLabel">AI</span>
          <button type="button" class="toggle-btn" id="aiToggle" title="Toggle AI"></button>
        </div>
      </div>
    </header>
    <main>
      <div class="viewer-toolbar u-flex-between u-gap-md">
        <label class="toolbar-field">
          <span class="toolbar-label">Sort</span>
          <select id="sortSelect" class="toolbar-select" title="Order sims within each group">
            <option value="name">Name</option>
            <option value="tick">Game order</option>
            <option value="household">Household</option>
            <option value="age">Age</option>
            <option value="kind">Type (player / NPC)</option>
          </select>
        </label>
        <label class="toolbar-field">
          <span class="toolbar-label">Show</span>
          <select id="filterSelect" class="toolbar-select" title="Which sims to display">
            <option value="all">Everyone</option>
            <option value="npc">NPCs only</option>
            <option value="player">Played sims only</option>
          </select>
        </label>
      </div>
      <div class="sim-grid-stack">
        <div class="sim-grid" id="simGrid"></div>
        <div class="sim-grid-region sim-grid-region--offlot" id="simGridOffLotRegion" hidden>
          <!-- No `open` attribute: collapsed by default; hides off-lot card grid until expanded -->
          <details class="sim-offlot-details">
            <summary class="sim-offlot-summary">
              <span class="sim-lot-divider__label">Not on this lot</span>
              <span class="sim-lot-divider__chev" aria-hidden="true">&#9660;</span>
            </summary>
            <div class="sim-grid sim-grid-offlot" id="simGridOffLot"></div>
          </details>
        </div>
      </div>
    </main>

    <aside
      id="modLogPanel"
      class="mod-log-panel"
      aria-hidden="true"
      aria-label="Mod debug log"
    >
      <div class="mod-log-panel-header">
        <h2 class="mod-log-title">Mod log</h2>
        <button type="button" class="mod-log-close-btn" id="modLogClose" title="Hide">
          ×
        </button>
      </div>
      <div class="mod-log-toolbar">
        <div class="mod-log-toolbar-btns">
          <button type="button" class="action-btn action-btn--secondary" id="modLogClear">
            Clear history
          </button>
          <button type="button" class="action-btn" id="modLogCopyAll" title="Copies lines that match the minimum level filter">
            Copy all
          </button>
        </div>
        <label class="toolbar-field mod-log-min-field">
          <span class="toolbar-label">Min level</span>
          <select id="modLogMinLevel" class="toolbar-select" title="Show this severity and more severe (like Cloud Logging)">
            <option value="debug">All · debug+</option>
            <option value="info">Info · info+</option>
            <option value="error">Error only</option>
          </select>
        </label>
        <span class="mod-log-count" id="modLogCount"></span>
      </div>
      <div class="mod-log-list" id="modLogList"></div>
    </aside>

    <script>
      (function () {
        var base = location.pathname.replace(/\/?$/, '/');
        var s = document.createElement('script');
        s.type = 'module';
        s.src = base + 'static/viewer/main.js';
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
