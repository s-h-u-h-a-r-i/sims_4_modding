<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NPC AI — viewer</title>
    <script>
      (function () {
        var base = location.pathname.replace(/\/?$/, '/');
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = base + 'static/viewer.css';
        document.head.appendChild(link);
      })();
    </script>
  </head>
  <body>
    <header>
      <div id="status">Connecting…</div>
      <div class="ai-toggle">
        <span id="aiLabel">AI</span>
        <button type="button" class="toggle-btn" id="aiToggle" title="Toggle AI"></button>
      </div>
    </header>
    <main>
      <div class="sim-grid" id="simGrid"></div>
    </main>

    <script>
      (function () {
        var base = location.pathname.replace(/\/?$/, '/');
        var s = document.createElement('script');
        s.src = base + 'static/viewer.js';
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
